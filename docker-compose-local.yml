version: "3"
services:
  exdiary-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "8851:8851"
    volumes:
      - ~/.dockerdata/ExerciseDiary:/data/ExerciseDiary
    environment:
      TZ: America/New_York
      PORT: "8851"
      HOST: "0.0.0.0"
      THEME: "grass"
      COLOR: "light"
      HEATCOLOR: "#03a70c"
      PAGESTEP: "10"
      # API_KEY: "changeme"
      # AUTH: "true"
      # AUTH_USER: "admin"
      # AUTH_PASSWORD: ""
      # AUTH_EXPIRE: "7d"

  exdiary-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - exdiary-api
    environment:
      TZ: America/New_York
      PORT: "8080"
      API_URL: "http://exdiary-api:8851"
      # API_KEY: "changeme"
      # NODE_PATH: ""
