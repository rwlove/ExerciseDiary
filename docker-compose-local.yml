version: "3"
services:
  exdiary-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
    - 8851:8851
    volumes:
    - ~/.dockerdata/ExerciseDiary:/data/ExerciseDiary
    environment:
      TZ: America/New_York

  exdiary-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
    - 8080:8080
    command: "-a http://exdiary-api:8851"
    depends_on:
      - exdiary-api
    environment:
      TZ: America/New_York
