version: "3"
services:
  exdiary-api:
    image: ghcr.io/rwlove/workoutdiary-api:latest
    restart: unless-stopped
    ports:
      - "8851:8851"
    volumes:
      - ~/.dockerdata/WorkoutDiary:/data/WorkoutDiary
    environment:
      TZ: America/New_York
      PORT: "8851"
      HOST: "0.0.0.0"
      THEME: "grass"
      COLOR: "dark"
      HEATCOLOR: "#03a70c"
      PAGESTEP: "10"
      # API_KEY: "changeme"         # uncomment to require X-Api-Key on every request
      # AUTH: "true"                # uncomment to enable session auth
      # AUTH_USER: "admin"
      # AUTH_PASSWORD: ""           # bcrypt hash — see docs/BCRYPT.md
      # AUTH_EXPIRE: "7d"

  exdiary-frontend:
    image: ghcr.io/rwlove/workoutdiary-frontend:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - exdiary-api
    environment:
      TZ: America/New_York
      PORT: "8080"
      API_URL: "http://exdiary-api:8851"
      # API_KEY: "changeme"         # must match exdiary-api API_KEY when set
      # NODE_PATH: ""               # set to local node-bootstrap URL for offline use
