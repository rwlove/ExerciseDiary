{{ define "stats.html" }}
<head>
    <script src="/fs/public/js/heatmap.js"></script>
    <script src="/fs/public/js/stats.js"></script>
    <script src="/fs/public/js/weight-chart.js"></script>
    <link rel="stylesheet" type="text/css" href="/fs/public/css/index.css" />
</head>
<body>
    <script>window.exercises = {{ .ExData.Exs | json | safeJS }};</script>

    <!-- ── Stats Tab Bar ─────────────────────────────────────────────────── -->
    <div class="stats-tabs-bar">
      <div class="container-xl">
        <ul class="nav page-tabs" id="statsTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="page-tab-btn active" data-bs-toggle="tab" data-bs-target="#tab-overview" type="button" role="tab">
              <i class="bi bi-grid-1x2 me-2"></i>Overview
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="page-tab-btn" id="tab-activity-btn" data-bs-toggle="tab" data-bs-target="#tab-activity" type="button" role="tab">
              <i class="bi bi-calendar3 me-2"></i>Activity
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="page-tab-btn" id="tab-exercises-btn" data-bs-toggle="tab" data-bs-target="#tab-exercises" type="button" role="tab">
              <i class="bi bi-dumbbell me-2"></i>Exercises
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="page-tab-btn" id="tab-weight-btn" data-bs-toggle="tab" data-bs-target="#tab-weight" type="button" role="tab">
              <i class="bi bi-speedometer2 me-2"></i>Body Weight
            </button>
          </li>
        </ul>
      </div>
    </div>

    <div class="tab-content">

      <!-- ── Overview ────────────────────────��─────────────────────────────── -->
      <div class="tab-pane fade show active" id="tab-overview" role="tabpanel">
        <div class="container-xl py-4">
          <div class="row g-4">

            <div class="col-12 col-lg-4">
              <div class="panel">
                <div class="panel-header">
                  <span class="panel-title">Summary</span>
                  <div class="btn-group btn-group-sm" id="period-btns" role="group">
                    <button type="button" class="btn btn-sm btn-outline-secondary active"
                      data-period="weekly" onclick="toggleSummaryPeriod('weekly')">Week</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary"
                      data-period="monthly" onclick="toggleSummaryPeriod('monthly')">Month</button>
                    <button type="button" class="btn btn-sm btn-outline-secondary"
                      data-period="annual" onclick="toggleSummaryPeriod('annual')">Year</button>
                  </div>
                </div>
                <div class="panel-body">
                  <small id="period-range" class="text-muted d-block mb-3" style="font-size:0.75em;"></small>
                  <div class="row g-2">
                    <div class="col-6">
                      <div class="p-3 rounded-3 bg-body-secondary text-center">
                        <div class="text-secondary small text-uppercase mb-1" style="font-size:0.72rem;letter-spacing:.05em;">Total Sets</div>
                        <div id="total-sets" class="fw-bold fs-4">-</div>
                      </div>
                    </div>
                    <div class="col-6">
                      <div class="p-3 rounded-3 bg-body-secondary text-center">
                        <div class="text-secondary small text-uppercase mb-1" style="font-size:0.72rem;letter-spacing:.05em;">Active Days</div>
                        <div id="active-days" class="fw-bold fs-4">-</div>
                      </div>
                    </div>
                    <div class="col-6">
                      <div class="p-3 rounded-3 bg-body-secondary text-center">
                        <div class="text-secondary small text-uppercase mb-1" style="font-size:0.72rem;letter-spacing:.05em;">Most Common</div>
                        <div id="most-common" class="fw-bold" style="font-size:0.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">-</div>
                      </div>
                    </div>
                    <div class="col-6">
                      <div class="p-3 rounded-3 bg-body-secondary text-center">
                        <div class="text-secondary small text-uppercase mb-1" style="font-size:0.72rem;letter-spacing:.05em;">Least Common</div>
                        <div id="least-common" class="fw-bold" style="font-size:0.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">-</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12 col-lg-8">
              <div class="panel">
                <div class="panel-header"><span class="panel-title">Exercise Distribution</span></div>
                <div class="panel-body">
                  <canvas id="exercise-distribution" style="max-height:280px;"></canvas>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- ── Activity ───────────────────────────────────────────────────────── -->
      <div class="tab-pane fade" id="tab-activity" role="tabpanel">
        <div class="container-xl py-4">
          <div class="row g-4">

            <div class="col-12 col-lg-9">
              <div class="panel">
                <div class="panel-header"><span class="panel-title">Exercise Colors</span></div>
                <div class="panel-body p-2">
                  <div class="horiz-scroll">
                    <div style="height:110px;width:900px;">
                      <canvas id="color-chart" style="height:100%;width:100%;"></canvas>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12 col-lg-3">
              <div class="panel">
                <div class="panel-header"><span class="panel-title">Legend</span></div>
                <div class="panel-body">
                  <div class="legend-grid">
                    {{ range .ExData.Exs }}
                    <div class="legend-item">
                      <div class="legend-color" style="background-color:{{ .Color }};"></div>
                      <span class="legend-name">{{ .Name }}</span>
                    </div>
                    {{ end }}
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- ── Exercises ──────────────────────────────────────────────────────── -->
      <div class="tab-pane fade" id="tab-exercises" role="tabpanel">
        <div class="container-xl py-4">
          <div class="row g-4">

            <div class="col-12 col-lg-4">
              <div class="panel">
                <div class="panel-header"><span class="panel-title">Exercise History</span></div>
                <div class="panel-body">
                  <form onchange='sOffset=0; setStatsPage({{ .ExData.Sets }}, {{ .Config.HeatColor }}, 0, {{ .Config.PageStep }});'>
                    <select class="form-select form-select-sm mb-3" id="ex-value">
                      {{ range $gr := .GroupMap }}
                      <option value="{{ $gr }}">{{ $gr }}</option>
                      {{ end }}
                    </select>
                  </form>
                  <table class="table table-borderless table-sm">
                    <thead>
                      <tr>
                        <th class="col-1"></th>
                        <th>Date</th>
                        <th>Weight</th>
                        <th>Reps</th>
                      </tr>
                    </thead>
                    <tbody id="stats-table"></tbody>
                  </table>
                  <div class="d-flex gap-2 justify-content-center">
                    <button onclick='setStatsPage({{ .ExData.Sets }}, {{ .Config.HeatColor }}, 1, {{ .Config.PageStep }})' class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left-square"></i></button>
                    <button onclick='setStatsPage({{ .ExData.Sets }}, {{ .Config.HeatColor }}, -1, {{ .Config.PageStep }})' class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-right-square"></i></button>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12 col-lg-8">
              <div class="panel">
                <div class="panel-header"><span class="panel-title">Weight Used</span></div>
                <div class="panel-body">
                  <canvas id="stats-ex-weight" style="max-height:220px;"></canvas>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- ── Body Weight ─────────────────────────────────────────────────────── -->
      <div class="tab-pane fade" id="tab-weight" role="tabpanel">
        <div class="container-xl py-4">
          <div class="row g-4">
            <div class="col-12">
              <div class="panel">
                <div class="panel-header"><span class="panel-title">Body Weight</span></div>
                <div class="panel-body">
                  <canvas id="stats-body-weight" style="max-height:300px;"></canvas>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

<script>
    window.currentSets = {{ .ExData.Sets }};
    window._colorHeatMap = {{ .ColorHeatMap }};
    window._allWeight = {{ .ExData.Weight }};
    window._heatColor = {{ .Config.HeatColor }};

    // Overview (active by default)
    (function() {
        var { start, end } = getPeriodDates('weekly');
        var rangeEl = document.getElementById('period-range');
        if (rangeEl) rangeEl.textContent = formatDate(start) + ' – ' + formatDate(end);
    })();
    var _initSets = filterByPeriod(window.currentSets, 'weekly');
    updateSummaryDisplay(_initSets);
    updateExerciseDistribution(_initSets, window.exercises);

    // Lazy-init hidden tabs on first show
    document.getElementById('tab-activity-btn').addEventListener('shown.bs.tab', function() {
        makeColorChart(window._colorHeatMap);
    });
    document.getElementById('tab-exercises-btn').addEventListener('shown.bs.tab', function() {
        setStatsPage(window.currentSets, window._heatColor, 0, {{ .Config.PageStep }});
    });
    document.getElementById('tab-weight-btn').addEventListener('shown.bs.tab', function() {
        generateWeightChart(window._allWeight, window._heatColor, 0, 'stats-body-weight');
    });
</script>

{{ template "footer.html" }}
{{ end }}
