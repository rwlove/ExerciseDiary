{{ define "header.html"}}

<!DOCTYPE html>
<html lang="en" data-bs-theme="{{ .Config.Color }}">
<head>
    <title>Workout Diary</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/fs/public/favicon.png">
    <!-- PWA -->
    <link rel="manifest" href="/fs/public/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/fs/public/favicon.png">
    {{ if eq .Config.NodePath "" }}
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Bootstrap + Theme -->
    <link id="bootstrap-theme-link" href="https://cdn.jsdelivr.net/npm/aceberg-bootswatch-fork@v5.3.3-2/dist/{{ .Config.Theme }}/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix@2.0.1"></script>
    {{ else }}
    <link rel="stylesheet" href="{{ .Config.NodePath }}/node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link id="bootstrap-theme-link" href="{{ .Config.NodePath }}/node_modules/bootswatch/dist/{{ .Config.Theme }}/bootstrap.min.css" rel="stylesheet">
    <script src="{{ .Config.NodePath }}/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ .Config.NodePath }}/node_modules/chart.js/dist/chart.umd.js"></script>
    <script src="{{ .Config.NodePath }}/node_modules/chartjs-chart-matrix/dist/chartjs-chart-matrix.min.js"></script>
    {{ end }}
    <!-- Global custom styles -->
    <link rel="stylesheet" type="text/css" href="/fs/public/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-sm bg-body-tertiary border-bottom">
        <div class="container-xl">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <img src="/fs/public/favicon.png" style="width:1.6em; border-radius:6px;" alt="logo">
                <span>Workout Diary</span>
            </a>
            <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto mb-2 mb-sm-0 align-items-sm-center gap-sm-1">
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-1" href="/stats/">
                            <i class="bi bi-bar-chart-line"></i><span>Stats</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-1" href="/weight/">
                            <i class="bi bi-speedometer2"></i><span>Weight</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-1" href="/config/">
                            <i class="bi bi-gear"></i><span>Settings</span>
                        </a>
                    </li>
                    {{ if .Config.Auth }}
                    <li class="nav-item">
                        <a class="nav-link d-flex align-items-center gap-1" href="/login/?logout=yes">
                            <i class="bi bi-box-arrow-right"></i><span>Log Out</span>
                        </a>
                    </li>
                    {{ end }}
                </ul>
            </div>
        </div>
    </nav>
{{ end }}
